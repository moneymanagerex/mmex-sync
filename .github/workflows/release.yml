name: Create Production Release

on:
  push:
    branches:
      - stable

jobs:
  release:
    name: Build, Test and Publish Release
    runs-on: ubuntu-latest # 💡 Cambiato da windows-latest a ubuntu-latest per velocità e stabilità
    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Installazione dipendenze
        run: npm ci

      - name: Esecuzione Test e Creazione Pacchetto (npm run release)
        run: npm run release

      - name: Estrazione versione da package.json
        id: get_version
        shell: bash
        run: |
          # 💡 Modificato il modo di leggere il package.json per essere nativo ESM 
          VERSION=$(node -e "import fs from 'fs'; console.log(JSON.parse(fs.readFileSync('./package.json')).version);")
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Creazione e Pubblicazione GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: dist/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}