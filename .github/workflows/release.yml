name: Create Production Release

on:
  push:
    branches:
      - stable

jobs:
  release:
    name: Build, Test and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Usiamo la versione LTS più recente e stabile per i runner
          cache: 'npm'

      - name: Installazione dipendenze
        run: npm ci

      - name: Esecuzione Test e Creazione Pacchetto (npm run release)
        run: npm run release
        # Nota: npm run release esegue in automatico 'npm run test', 'build' e 'package' di seguito.

      - name: Estrazione versione da package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Creazione e Pubblicazione GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: dist/release/*.zip # Punta alla nuova cartella concordata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}