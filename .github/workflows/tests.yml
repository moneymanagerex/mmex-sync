name: Run Tests on Pull Request

on:
  pull_request:
    branches:
      - main
      - stable

jobs:
  test:
    name: Execute Automated Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Node.js (v22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Aggiornato alla versione LTS stabile con pieno supporto a node:sqlite
          cache: 'npm'

      - name: Installazione dipendenze (Rigorosa per CI)
        run: npm ci

      - name: Esecuzione Test Suite (Jest)
        run: npm test